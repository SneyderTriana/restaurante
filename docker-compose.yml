

services:
  postgres:
    image: postgres:15
    container_name: restaurant-postgres

    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - restaurant-network

  backend:
    build: ./backend
    container_name: restaurant-backend

    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: restaurant_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: mi-super-secreto
      JWT_EXPIRES_IN: 24h

    ports:
      - "5000:5000"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - restaurant-network

  frontend:
    build: ./frontend
    container_name: restaurant-frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  postgres_data: