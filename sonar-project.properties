# SonarQube configuration
sonar.projectKey=restaurant-system
sonar.projectName=Restaurant Management System
sonar.projectVersion=1.0.0

# Sources and tests
sonar.sources=backend/src,frontend/src
sonar.tests=backend/tests,frontend/tests
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.test.js,**/*.spec.js,**/coverage/**,**/dist/**,**/build/**

# Quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Organization (if using SonarCloud)
sonar.organization=restaurant-system

# Host URL (for self-hosted)
# sonar.host.url=http://localhost:9000