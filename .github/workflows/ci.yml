name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Clonar repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configurar Node.js compatible con Vite
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # =========================
      # BACKEND
      # =========================
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      # =========================
      # FRONTEND
      # =========================
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      # Ejecutar ESLint
      - name: Run frontend lint
        working-directory: ./frontend
        run: npm run lint

      # Build del frontend
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # Validar Docker Compose
      - name: Docker Compose Validation
        run: docker compose config

      # Mensaje final
      - name: Pipeline Success
        run: echo "CI/CD Pipeline ejecutado correctamente"